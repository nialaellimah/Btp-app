<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>App BTP Pro</title>
<link rel="stylesheet" href="style.css">

<style>
body{
  font-family:Arial;
  background:#f2f2f2;
  padding:15px;
}

h1{
  text-align:center;
}

.box{
  background:white;
  padding:15px;
  margin-top:15px;
  border-radius:10px;
}

button{
  width:100%;
  padding:15px;
  margin-top:10px;
  font-size:16px;
  border:none;
  border-radius:10px;
  background:#1976d2;
  color:white;
}

input{
  width:100%;
  padding:10px;
  margin-top:5px;
  font-size:16px;
}

.result{
  margin-top:10px;
  font-weight:bold;
}
</style>
</head>

<body>

<h1>🏗️ App BTP Pro</h1>

<!-- CALCULS -->
<div class="box">
<h2>🧮 Calculs BTP</h2>

<input id="longueur" placeholder="Longueur (m)">
<input id="largeur" placeholder="Largeur (m)">
<button onclick="calcSurface()">📐 Calcul surface (m²)</button>

<button onclick="calcPerimetre()">📏 Calcul périmètre</button>

<input id="hauteur" placeholder="Hauteur (m)">
<button onclick="calcVolume()">🧱 Calcul volume (m³)</button>

<div class="result" id="resultat"></div>
</div>

<!-- QUIZ AIPR / H0B0 -->
<div class="box">
<h2>🧠 Quiz AIPR / H0B0 (40 questions)</h2>

<button onclick="startQuiz()">▶️ Démarrer le quiz</button>

<div class="result" id="quiz"></div>
</div>

<script>

// =====================
// CALCUL SURFACE
// =====================
function calcSurface(){
  let l = parseFloat(document.getElementById("longueur").value);
  let L = parseFloat(document.getElementById("largeur").value);

  let res = l * L;

  document.getElementById("resultat").innerHTML =
  "📐 Surface : " + res + " m²";
}

// =====================
// PERIMETRE
// =====================
function calcPerimetre(){
  let l = parseFloat(document.getElementById("longueur").value);
  let L = parseFloat(document.getElementById("largeur").value);

  let res = 2 * (l + L);

  document.getElementById("resultat").innerHTML =
  "📏 Périmètre : " + res + " m";
}

// =====================
// VOLUME
// =====================
function calcVolume(){
  let l = parseFloat(document.getElementById("longueur").value);
  let L = parseFloat(document.getElementById("largeur").value);
  let h = parseFloat(document.getElementById("hauteur").value);

  let res = l * L * h;

  document.getElementById("resultat").innerHTML =
  "🧱 Volume : " + res + " m³";
}

// =====================
// QUIZ AIPR / H0B0 (40 QUESTIONS)
// =====================
let questions = [
"AIPR : Que signifie AIPR ?",
"Quel est le rôle du DICT ?",
"Que faire avant de creuser ?",
"Quels risques sur un chantier ?",
"Que faire en cas de câble électrique ?",
"Qu’est-ce qu’un réseau enterré ?",
"Qui donne l’autorisation de travaux ?",
"Que signifie H0B0 ?",
"Quelle protection obligatoire sur chantier ?",
"Que faire en cas d’accident ?",

"Comment sécuriser une zone de fouille ?",
"Pourquoi baliser un chantier ?",
"Que signifie EPC ?",
"Que signifie EPI ?",
"Casque obligatoire quand ?",
"Chaussures de sécurité servent à quoi ?",
"Risque gaz sur chantier ?",
"Risque eau sur chantier ?",
"Travaux à proximité réseau ?",
"Règles de sécurité générales ?",

"Que faire avant intervention électrique ?",
"Différence HT / BT ?",
"Zone de danger électrique ?",
"Distance sécurité réseau ?",
"Signalisation chantier ?",
"Lecture plans réseaux ?",
"Responsabilité chef chantier ?",
"Formation obligatoire ?",
"Travaux sous tension ?",
"Intervention urgence ?",

"Conduite engins chantier ?",
"Signalisation piétons ?",
"Risques engins ?",
"Zone interdite ?",
"Travail en hauteur ?",
"Échafaudage sécurité ?",
"Harnais obligatoire ?",
"Chute objet prévention ?",
"Organisation chantier ?",
"Consignes générales sécurité ?"
];

let index = 0;

function startQuiz(){
  if(index >= questions.length){
    document.getElementById("quiz").innerHTML = "✅ Quiz terminé";
    index = 0;
    return;
  }

  document.getElementById("quiz").innerHTML =
  "❓ " + questions[index];

  index++;
}

</script>

</body>
</html>
