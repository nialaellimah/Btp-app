<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>App BTP - QCM AIPR H0B0</title>

<style>
body{
font-family: Arial;
padding: 10px;
}

button{
margin: 5px;
padding: 10px;
cursor: pointer;
}

#quiz, #meteo{
margin-bottom: 30px;
padding: 10px;
border: 1px solid #ccc;
border-radius: 10px;
}
</style>
</head>

<body>

<h1>App BTP - QCM AIPR / H0B0</h1>

<!-- ================= QCM ================= -->
<div id="quiz">
<h2>QCM Sécurité</h2>

<div id="question"></div>
<div id="answers"></div>

<p id="score"></p>
</div>

<!-- ================= METEO ================= -->
<div id="meteo">
<h2>Météo chantier</h2>

<input id="vent" placeholder="Vent km/h">
<input id="temp" placeholder="Température °C">

<button onclick="meteo()">Tester</button>

<div id="meteoResult"></div>
</div>

<script>
/* ================= QCM ================= */

let current = 0;
let score = 0;

const questions = [
{
q: "Que faire avant de creuser ?",
a: ["Appeler les secours", "Consulter les réseaux enterrés", "Rien"],
r: 1
},
{
q: "H0B0 signifie ?",
a: ["Travaux électriques sans habilitation", "Peinture", "Maçonnerie"],
r: 0
},
{
q: "Un câble électrique est découvert, je fais quoi ?",
a: ["Je touche", "Je signale et je m’éloigne", "Je coupe"],
r: 1
},
{
q: "AIPR sert à ?",
a: ["Travailler sur routes", "Travailler près des réseaux", "Peindre"],
r: 1
}
];

function loadQuestion(){
let q = questions[current];

document.getElementById("question").innerHTML = "<b>" + q.q + "</b>";

let html = "";

q.a.forEach((rep, i)=>{
html += `<button onclick="checkAnswer(${i})">${rep}</button><br>`;
});

document.getElementById("answers").innerHTML = html;
}

function checkAnswer(i){
if(i === questions[current].r){
score++;
}
nextQuestion();
}

function nextQuestion(){
current++;

if(current < questions.length){
loadQuestion();
}else{
document.getElementById("quiz").innerHTML =
"✔️ QCM terminé <br> Score : " + score + "/" + questions.length;
}
}

loadQuestion();


/* ================= METEO ================= */

function meteo(){

let vent = Number(document.getElementById("vent").value);
let temp = Number(document.getElementById("temp").value);

let message = "";

if(vent > 40){
message += "⚠️ Vent fort chantier<br>";
}else{
message += "✔️ Conditions normales<br>";
}

message += "Température : " + temp + "°C";

document.getElementById("meteoResult").innerHTML = message;
}
</script>

</body>
</html>
